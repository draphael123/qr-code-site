<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan to Access Resources</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Scan to Access Resources</h1>

        <div class="qr-section">
            <div id="qr-code"></div>
            <p id="qr-placeholder">Loading QR code...</p>
        </div>

        <p class="instruction">Scan this QR code with your phone camera</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
