<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan to Access Resources</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Scan to Access Resources</h1>

        <div class="qr-section">
            <div id="qr-code"></div>
            <p id="qr-placeholder">Loading QR code...</p>
        </div>

        <p class="instruction">Scan this QR code with your phone camera</p>

        <div class="download-section">
            <div class="dropdown">
                <button class="dropdown-btn">Download QR Code</button>
                <div class="dropdown-content">
                    <a href="#" id="download-png-small">PNG - Small (250px)</a>
                    <a href="#" id="download-png-medium">PNG - Medium (500px)</a>
                    <a href="#" id="download-png-large">PNG - Large (1000px)</a>
                    <a href="#" id="download-svg">SVG - Vector (scalable)</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
